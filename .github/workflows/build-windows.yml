name: Build Windows Packages (on Linux)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-on-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build JARs with Maven
      run: |
        echo "=== Building with Maven ==="
        mvn clean package -DskipTests
        echo ""
        echo "=== Verifying JARs ==="
        ls -lh target/*.jar

    - name: Verify JARs created
      run: |
        echo "=== Checking JAR files ==="

        if [ -f "target/remote-server.jar" ]; then
          echo "✅ remote-server.jar found"
          ls -lh target/remote-server.jar
        else
          echo "❌ remote-server.jar NOT FOUND!"
          exit 1
        fi

        if [ -f "target/remote-client.jar" ]; then
          echo "✅ remote-client.jar found"
          ls -lh target/remote-client.jar
        else
          echo "❌ remote-client.jar NOT FOUND!"
          exit 1
        fi

    - name: Download Windows JDK for jlink
      run: |
        echo "=== Downloading Windows JDK 17 for jlink ==="

        # Download Windows JDK (for creating Windows JRE)
        wget -q https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.9%2B9/OpenJDK17U-jdk_x64_windows_hotspot_17.0.9_9.zip

        echo "=== Extracting Windows JDK ==="
        unzip -q OpenJDK17U-jdk_x64_windows_hotspot_17.0.9_9.zip

        # Rename to standard name
        mv jdk-17.0.9+9 windows-jdk

        echo "=== Windows JDK extracted ==="
        ls -lh windows-jdk/bin/ | head -10

    - name: Create Minimal Windows JRE with jlink
      run: |
        echo "=== Creating minimal Windows JRE with jlink ==="

        # Use the downloaded Windows JDK to create Windows JRE
        MODULES="java.base,java.desktop,java.logging,java.management,java.naming,java.net.http,java.sql,java.xml"

        ./windows-jdk/bin/jlink \
          --add-modules $MODULES \
          --output jre-windows \
          --strip-debug \
          --no-header-files \
          --no-man-pages \
          --compress=2

        echo "=== Windows JRE created ==="
        du -sh jre-windows
        echo ""
        echo "JRE contents:"
        ls -lh jre-windows/

    - name: Create Server Package
      run: |
        echo "=== Creating Server package ==="

        # Create directory structure
        mkdir -p release/RemoteServer

        # Copy JAR
        cp target/remote-server.jar release/RemoteServer/

        # Copy Windows JRE
        cp -r jre-windows release/RemoteServer/jre

        # Create Windows launch script (.bat)
        cat > release/RemoteServer/RemoteServer.bat << 'EOF'
        @echo off
        echo ================================================================
        echo           REMOTE CONTROL SERVER - Starting...
        echo ================================================================
        echo.

        REM Get script directory
        set SCRIPT_DIR=%~dp0

        REM Check if bundled JRE exists
        if exist "%SCRIPT_DIR%jre\bin\java.exe" (
            echo Using bundled JRE...
            "%SCRIPT_DIR%jre\bin\java.exe" -jar "%SCRIPT_DIR%remote-server.jar"
        ) else (
            echo Bundled JRE not found, trying system Java...
            java -jar "%SCRIPT_DIR%remote-server.jar"
        )

        echo.
        echo Server stopped.
        pause
        EOF

        # Create Linux launch script (.sh) for testing
        cat > release/RemoteServer/RemoteServer.sh << 'EOF'
        #!/bin/bash
        echo "================================================================"
        echo "           REMOTE CONTROL SERVER - Starting..."
        echo "================================================================"
        echo ""

        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

        if [ -f "$SCRIPT_DIR/jre/bin/java" ]; then
            echo "Using bundled JRE..."
            "$SCRIPT_DIR/jre/bin/java" -jar "$SCRIPT_DIR/remote-server.jar"
        else
            echo "Bundled JRE not found, trying system Java..."
            java -jar "$SCRIPT_DIR/remote-server.jar"
        fi
        EOF
        chmod +x release/RemoteServer/RemoteServer.sh

        # Create README
        cat > release/RemoteServer/README.txt << 'EOF'
        ╔══════════════════════════════════════════════════════════════╗
        ║           REMOTE CONTROL SERVER - Windows                     ║
        ╚══════════════════════════════════════════════════════════════╝

        🚀 QUICK START:

        WINDOWS:
        --------
        1. Double-click "RemoteServer.bat"
        2. Server will start and show IP addresses
        3. Note the IP (e.g., 192.168.1.100) for client

        LINUX/MAC (for testing):
        -------------------------
        1. Run: ./RemoteServer.sh
        2. Note the IP address shown

        ═══════════════════════════════════════════════════════════════

        📦 PACKAGE CONTENTS:

        remote-server.jar    - Server application
        jre/                 - Java Runtime (bundled, no install needed!)
        RemoteServer.bat     - Windows launcher
        RemoteServer.sh      - Linux/Mac launcher
        README.txt           - This file

        ═══════════════════════════════════════════════════════════════

        ⚙️ SYSTEM REQUIREMENTS:

        • Windows 7 or later (64-bit)
        • OR Linux/Mac (for testing)
        • No Java installation required!
        • Network adapter (WiFi or Ethernet)
        • ~50MB disk space

        ═══════════════════════════════════════════════════════════════

        🔥 WINDOWS FIREWALL:

        If Windows Firewall blocks:
        1. Click "Allow access" when prompted
        2. Or manually allow port 8888

        ═══════════════════════════════════════════════════════════════

        📝 NOTES:

        • Server listens on port 8888
        • All IP addresses shown in UI
        • Clients must be on same LAN
        • Bundled JRE is Windows-compatible

        Version: 1.0.0
        Built on: Ubuntu (GitHub Actions)

        EOF

        echo "✅ Server package created"
        ls -lah release/RemoteServer/

    - name: Create Client Package
      run: |
        echo "=== Creating Client package ==="

        # Create directory structure
        mkdir -p release/RemoteClient

        # Copy JAR
        cp target/remote-client.jar release/RemoteClient/

        # Copy Windows JRE
        cp -r jre-windows release/RemoteClient/jre

        # Create Windows launch script (.bat)
        cat > release/RemoteClient/RemoteClient.bat << 'EOF'
        @echo off
        echo ================================================================
        echo           REMOTE CONTROL CLIENT - Starting...
        echo ================================================================
        echo.

        REM Get script directory
        set SCRIPT_DIR=%~dp0

        REM Check if bundled JRE exists
        if exist "%SCRIPT_DIR%jre\bin\java.exe" (
            echo Using bundled JRE...
            "%SCRIPT_DIR%jre\bin\java.exe" -jar "%SCRIPT_DIR%remote-client.jar"
        ) else (
            echo Bundled JRE not found, trying system Java...
            java -jar "%SCRIPT_DIR%remote-client.jar"
        )

        echo.
        echo Client stopped.
        pause
        EOF

        # Create Linux launch script (.sh) for testing
        cat > release/RemoteClient/RemoteClient.sh << 'EOF'
        #!/bin/bash
        echo "================================================================"
        echo "           REMOTE CONTROL CLIENT - Starting..."
        echo "================================================================"
        echo ""

        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

        if [ -f "$SCRIPT_DIR/jre/bin/java" ]; then
            echo "Using bundled JRE..."
            "$SCRIPT_DIR/jre/bin/java" -jar "$SCRIPT_DIR/remote-client.jar"
        else
            echo "Bundled JRE not found, trying system Java..."
            java -jar "$SCRIPT_DIR/remote-client.jar"
        fi
        EOF
        chmod +x release/RemoteClient/RemoteClient.sh

        # Create README
        cat > release/RemoteClient/README.txt << 'EOF'
        ╔══════════════════════════════════════════════════════════════╗
        ║           REMOTE CONTROL CLIENT - Windows                     ║
        ╚══════════════════════════════════════════════════════════════╝

        🚀 QUICK START:

        WINDOWS:
        --------
        1. Double-click "RemoteClient.bat"
        2. Enter server IP in "Server" field
        3. Port: 8888 (default)
        4. Click "Connect"

        LINUX/MAC (for testing):
        -------------------------
        1. Run: ./RemoteClient.sh
        2. Follow same connection steps

        ═══════════════════════════════════════════════════════════════

        📦 PACKAGE CONTENTS:

        remote-client.jar    - Client application
        jre/                 - Java Runtime (bundled, no install needed!)
        RemoteClient.bat     - Windows launcher
        RemoteClient.sh      - Linux/Mac launcher
        README.txt           - This file

        ═══════════════════════════════════════════════════════════════

        ⚙️ SYSTEM REQUIREMENTS:

        • Windows 7 or later (64-bit)
        • OR Linux/Mac (for testing)
        • No Java installation required!
        • Network connection
        • ~50MB disk space

        ═══════════════════════════════════════════════════════════════

        🔗 CONNECTION:

        Get server IP from server UI (e.g., 192.168.1.100)
        Enter in "Server" field
        Port: 8888
        Click "Connect"

        ═══════════════════════════════════════════════════════════════

        🎮 FEATURES:

        ✅ Application Management
        ✅ Process Management
        ✅ Screenshot Capture
        ✅ File Transfer
        ✅ System Control

        ═══════════════════════════════════════════════════════════════

        📝 NOTES:

        • Client and server must be on same LAN
        • Check firewall if connection fails
        • Bundled JRE is Windows-compatible

        Version: 1.0.0
        Built on: Ubuntu (GitHub Actions)

        EOF

        echo "✅ Client package created"
        ls -lah release/RemoteClient/

    - name: Create ZIP archives
      run: |
        echo "=== Creating ZIP archives ==="

        cd release

        # Create Server ZIP
        zip -r -q RemoteControlServer-Windows.zip RemoteServer/
        SERVER_SIZE=$(du -h RemoteControlServer-Windows.zip | cut -f1)
        echo "✅ Server ZIP: $SERVER_SIZE"

        # Create Client ZIP
        zip -r -q RemoteControlClient-Windows.zip RemoteClient/
        CLIENT_SIZE=$(du -h RemoteControlClient-Windows.zip | cut -f1)
        echo "✅ Client ZIP: $CLIENT_SIZE"

        cd ..
        ls -lh release/*.zip

    - name: Upload Server Bundle
      uses: actions/upload-artifact@v4
      with:
        name: RemoteControlServer-Windows
        path: release/RemoteControlServer-Windows.zip
        retention-days: 90

    - name: Upload Client Bundle
      uses: actions/upload-artifact@v4
      with:
        name: RemoteControlClient-Windows
        path: release/RemoteControlClient-Windows.zip
        retention-days: 90

    - name: Create Build Summary
      run: |
        SERVER_SIZE=$(du -h release/RemoteControlServer-Windows.zip | cut -f1)
        CLIENT_SIZE=$(du -h release/RemoteControlClient-Windows.zip | cut -f1)

        cat >> $GITHUB_STEP_SUMMARY << EOF
        # 🎉 Windows Build Complete (Built on Linux)!

        ## 📦 Artifacts Created

        ### 🖥️ Server Bundle
        - **File:** RemoteControlServer-Windows.zip
        - **Size:** $SERVER_SIZE
        - **Contents:**
          - ✅ remote-server.jar
          - ✅ Bundled Windows JRE (minimal, ~35MB)
          - ✅ RemoteServer.bat (Windows launcher)
          - ✅ RemoteServer.sh (Linux/Mac launcher)
          - ✅ README.txt

        ### 💻 Client Bundle
        - **File:** RemoteControlClient-Windows.zip
        - **Size:** $CLIENT_SIZE
        - **Contents:**
          - ✅ remote-client.jar
          - ✅ Bundled Windows JRE (minimal, ~35MB)
          - ✅ RemoteClient.bat (Windows launcher)
          - ✅ RemoteClient.sh (Linux/Mac launcher)
          - ✅ README.txt

        ## 🚀 How to Use

        ### On Windows:
        1. Download and extract ZIP
        2. Double-click \`RemoteServer.bat\` or \`RemoteClient.bat\`
        3. No Java installation needed!

        ### On Linux/Mac (for testing):
        1. Download and extract ZIP
        2. Run: \`./RemoteServer.sh\` or \`./RemoteClient.sh\`
        3. Bundled JRE is Windows-only, so system Java will be used

        ## ✅ Features

        - ✅ **No Java Required on Windows** - JRE bundled
        - ✅ **Simple .bat scripts** - Double-click to run
        - ✅ **Cross-platform build** - Built on Linux for Windows
        - ✅ **Minimal JRE** - Only 35MB (vs 180MB full JRE)
        - ✅ **Self-contained** - Everything included

        ## 📝 Notes

        - Built on Ubuntu (Linux) using cross-platform tools
        - Windows JRE created with jlink
        - Simple .bat scripts instead of .exe
        - Works on Windows 7+ (64-bit)

        ---

        **Build Date:** $(date '+%Y-%m-%d %H:%M:%S UTC')
        **Platform:** Ubuntu Latest (Linux)
        **Target:** Windows x64
        EOF
