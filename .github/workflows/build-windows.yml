name: Build Windows Packages (Simplified)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows-packages:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17 for building
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build JARs with Maven
      run: |
        echo "=== Building JARs with Maven ==="
        mvn clean package -DskipTests

        echo ""
        echo "=== Build complete ==="
        ls -lh target/*.jar

    - name: Verify JARs
      run: |
        if [ ! -f "target/remote-server.jar" ]; then
          echo "❌ remote-server.jar not found!"
          exit 1
        fi
        if [ ! -f "target/remote-client.jar" ]; then
          echo "❌ remote-client.jar not found!"
          exit 1
        fi
        echo "✅ Both JARs created successfully"

    - name: Create custom JRE with jlink
      run: |
        echo "=== Creating minimal JRE with jlink ==="

        # Modules for Swing GUI application
        MODULES="java.base,java.desktop,java.logging,java.management,java.naming,java.net.http,java.sql,java.xml,java.prefs,java.datatransfer"

        # Create minimal JRE
        jlink \
          --add-modules $MODULES \
          --output jre-custom \
          --strip-debug \
          --no-header-files \
          --no-man-pages \
          --compress=2

        echo ""
        echo "=== JRE created ==="
        du -sh jre-custom
        ls -lh jre-custom/bin/

    - name: Create Server package
      run: |
        echo "=== Packaging Server ==="
        mkdir -p release/RemoteServer

        # Copy JAR
        cp target/remote-server.jar release/RemoteServer/

        # Copy JRE
        cp -r jre-custom release/RemoteServer/jre

        # Windows launcher
        cat > release/RemoteServer/RemoteServer.bat << 'EOF'
        @echo off
        title Remote Control Server
        echo ================================================================
        echo           REMOTE CONTROL SERVER
        echo ================================================================
        echo.
        echo Starting server...
        echo.

        set SCRIPT_DIR=%~dp0

        if exist "%SCRIPT_DIR%jre\bin\java.exe" (
            "%SCRIPT_DIR%jre\bin\java.exe" -jar "%SCRIPT_DIR%remote-server.jar"
        ) else (
            echo JRE not found, trying system Java...
            java -jar "%SCRIPT_DIR%remote-server.jar"
        )

        if errorlevel 1 (
            echo.
            echo ❌ Server failed to start!
            echo Check if port 8888 is available.
            pause
        )
        EOF

        # Linux/Mac launcher
        cat > release/RemoteServer/RemoteServer.sh << 'EOF'
        #!/bin/bash
        echo "================================================================"
        echo "           REMOTE CONTROL SERVER"
        echo "================================================================"
        echo ""
        echo "Starting server..."
        echo ""

        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

        if [ -f "$SCRIPT_DIR/jre/bin/java" ]; then
            "$SCRIPT_DIR/jre/bin/java" -jar "$SCRIPT_DIR/remote-server.jar"
        else
            echo "JRE not found, trying system Java..."
            java -jar "$SCRIPT_DIR/remote-server.jar"
        fi
        EOF
        chmod +x release/RemoteServer/RemoteServer.sh

        # README
        cat > release/RemoteServer/README.txt << 'EOF'
╔══════════════════════════════════════════════════════════════╗
║           REMOTE CONTROL SERVER                              ║
╚══════════════════════════════════════════════════════════════╝

🚀 QUICK START

Windows:
  1. Double-click RemoteServer.bat
  2. Server starts and shows IP addresses
  3. Give IP to client (e.g., 192.168.1.100)

Linux/Mac:
  1. Run: ./RemoteServer.sh
  2. Server starts and shows IP addresses

═══════════════════════════════════════════════════════════════

📦 CONTENTS

  remote-server.jar     - Server application
  jre/                  - Java Runtime (bundled)
  RemoteServer.bat      - Windows launcher
  RemoteServer.sh       - Linux/Mac launcher
  README.txt            - This file

═══════════════════════════════════════════════════════════════

⚙️ REQUIREMENTS

  • Windows 7+ / Linux / macOS
  • No Java installation needed!
  • ~50MB disk space
  • Network adapter

═══════════════════════════════════════════════════════════════

🔥 FIREWALL

Windows: Click "Allow access" when prompted
Linux: sudo ufw allow 8888
Port: 8888 (default)

═══════════════════════════════════════════════════════════════

