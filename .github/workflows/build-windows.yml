Version: 1.0.0
EOF

        echo "✅ Client package ready"

    - name: Create ZIP archives
      run: |
        echo "=== Creating ZIP archives ==="
        cd release

        # Server ZIP
        zip -r -q RemoteControlServer.zip RemoteServer/
        echo "✅ Server: $(du -h RemoteControlServer.zip | cut -f1)"

        # Client ZIP
        zip -r -q RemoteControlClient.zip RemoteClient/
        echo "✅ Client: $(du -h RemoteControlClient.zip | cut -f1)"

        cd ..
        ls -lh release/*.zip

    - name: Upload Server artifact
      uses: actions/upload-artifact@v4
      with:
        name: RemoteControlServer
        path: release/RemoteControlServer.zip
        retention-days: 90

    - name: Upload Client artifact
      uses: actions/upload-artifact@v4
      with:
        name: RemoteControlClient
        path: release/RemoteControlClient.zip
        retention-days: 90

    - name: Generate build summary
      run: |
        SERVER_SIZE=$(du -h release/RemoteControlServer.zip | cut -f1)
        CLIENT_SIZE=$(du -h release/RemoteControlClient.zip | cut -f1)

        cat >> $GITHUB_STEP_SUMMARY << EOF
        # 🎉 Build Successful!

        ## 📦 Artifacts

        | Package | Size | Description |
        |---------|------|-------------|
        | **RemoteControlServer.zip** | $SERVER_SIZE | Server with bundled JRE |
        | **RemoteControlClient.zip** | $CLIENT_SIZE | Client with bundled JRE |

        ## 🚀 Quick Start

        ### Windows:
        \`\`\`
        1. Extract ZIP
        2. Double-click RemoteServer.bat or RemoteClient.bat
        3. No Java installation needed!
        \`\`\`

        ### Linux/Mac:
        \`\`\`bash
        1. Extract ZIP
        2. ./RemoteServer.sh or ./RemoteClient.sh
        3. Works with bundled JRE!
        \`\`\`

        ## ✅ Features

        - ✅ Bundled JRE (~35MB, minimal)
        - ✅ Cross-platform (Windows/Linux/Mac)
        - ✅ No Java installation required
        - ✅ Simple launcher scripts
        - ✅ Professional packaging

        ## 📝 Notes

        - Built on Ubuntu Latest
        - JRE created with jlink (minimal modules)
        - .bat scripts for Windows double-click
        - .sh scripts for Linux/Mac
        - Port: 8888 (default)

        ---
        **Build Time:** $(date '+%Y-%m-%d %H:%M:%S UTC')
        **Platform:** ubuntu-latest
        **JDK:** Temurin 17
        EOF
