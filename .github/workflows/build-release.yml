name: Build Remote Control App with Bundled JRE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Verify JARs created
      run: |
        echo "=== Checking build artifacts ==="
        ls -lh target/*.jar
        echo ""
        echo "Server JAR:"
        ls -lh target/remote-server.jar || echo "❌ Server JAR not found!"
        echo ""
        echo "Client JAR:"
        ls -lh target/remote-client.jar || echo "❌ Client JAR not found!"

    - name: Download JRE 17 for bundling
      run: |
        echo "=== Downloading JRE 17 for Linux x64 ==="
        wget -q https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.9%2B9/OpenJDK17U-jre_x64_linux_hotspot_17.0.9_9.tar.gz

        echo "=== Extracting JRE ==="
        tar -xzf OpenJDK17U-jre_x64_linux_hotspot_17.0.9_9.tar.gz
        mv jdk-17.0.9+9-jre jre

        echo "=== JRE extracted ==="
        ls -lh jre/bin/java

    - name: Create Server bundle with JRE
      run: |
        echo "=== Creating Server bundle ==="
        mkdir -p release/server

        # Copy server JAR
        cp target/remote-server.jar release/server/

        # Copy JRE
        cp -r jre release/server/

        # Create launch script for Linux/Mac
        cat > release/server/start-server.sh << 'EOF'
        #!/bin/bash
        echo "=== Starting Remote Control Server ==="
        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        "$SCRIPT_DIR/jre/bin/java" -jar "$SCRIPT_DIR/remote-server.jar"
        EOF
        chmod +x release/server/start-server.sh

        # Create launch script for Windows
        cat > release/server/start-server.bat << 'EOF'
        @echo off
        echo === Starting Remote Control Server ===
        "%~dp0jre\bin\java.exe" -jar "%~dp0remote-server.jar"
        pause
        EOF

        # Create README
        cat > release/server/README.txt << 'EOF'
        REMOTE CONTROL SERVER
        ====================

        How to run:

        1. Linux/Mac:
           ./start-server.sh

        2. Windows:
           start-server.bat

        The server will display its IP addresses in the UI.
        Clients should connect to one of these IPs on port 8888.

        No Java installation required - JRE is bundled!
        EOF

        echo "Server bundle created: release/server/"
        ls -lah release/server/

    - name: Create Client bundle with JRE
      run: |
        echo "=== Creating Client bundle ==="
        mkdir -p release/client

        # Copy client JAR
        cp target/remote-client.jar release/client/

        # Copy JRE
        cp -r jre release/client/

        # Create launch script for Linux/Mac
        cat > release/client/start-client.sh << 'EOF'
        #!/bin/bash
        echo "=== Starting Remote Control Client ==="
        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        "$SCRIPT_DIR/jre/bin/java" -jar "$SCRIPT_DIR/remote-client.jar"
        EOF
        chmod +x release/client/start-client.sh

        # Create launch script for Windows
        cat > release/client/start-client.bat << 'EOF'
        @echo off
        echo === Starting Remote Control Client ===
        "%~dp0jre\bin\java.exe" -jar "%~dp0remote-client.jar"
        pause
        EOF

        # Create README
        cat > release/client/README.txt << 'EOF'
        REMOTE CONTROL CLIENT
        =====================

        How to run:

        1. Linux/Mac:
           ./start-client.sh

        2. Windows:
           start-client.bat

        In the UI, enter the server's IP address and click "Connect".

        No Java installation required - JRE is bundled!
        EOF

        echo "Client bundle created: release/client/"
        ls -lah release/client/

    - name: Create ZIP archives
      run: |
        echo "=== Creating ZIP archives ==="
        cd release

        # Create server ZIP
        zip -r remote-control-server.zip server/
        echo "✅ Server ZIP: $(du -h remote-control-server.zip | cut -f1)"

        # Create client ZIP
        zip -r remote-control-client.zip client/
        echo "✅ Client ZIP: $(du -h remote-control-client.zip | cut -f1)"

        cd ..
        ls -lh release/*.zip

    - name: Upload Server bundle
      uses: actions/upload-artifact@v3
      with:
        name: remote-control-server
        path: release/remote-control-server.zip
        retention-days: 30

    - name: Upload Client bundle
      uses: actions/upload-artifact@v3
      with:
        name: remote-control-client
        path: release/remote-control-client.zip
        retention-days: 30

    - name: Create Release Summary
      run: |
        echo "# 🎉 Build Successful!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📦 Artifacts Created" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Server Bundle" >> $GITHUB_STEP_SUMMARY
        echo "- File: \`remote-control-server.zip\`" >> $GITHUB_STEP_SUMMARY
        echo "- Size: $(du -h release/remote-control-server.zip | cut -f1)" >> $GITHUB_STEP_SUMMARY
        echo "- Contains: JAR + JRE + Launch scripts" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Client Bundle" >> $GITHUB_STEP_SUMMARY
        echo "- File: \`remote-control-client.zip\`" >> $GITHUB_STEP_SUMMARY
        echo "- Size: $(du -h release/remote-control-client.zip | cut -f1)" >> $GITHUB_STEP_SUMMARY
        echo "- Contains: JAR + JRE + Launch scripts" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 🚀 How to Use" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "1. Download both ZIP files from the Artifacts section above" >> $GITHUB_STEP_SUMMARY
        echo "2. Extract \`remote-control-server.zip\` on the target machine" >> $GITHUB_STEP_SUMMARY
        echo "3. Extract \`remote-control-client.zip\` on your control machine" >> $GITHUB_STEP_SUMMARY
        echo "4. Run \`start-server.sh\` (or \`.bat\` on Windows) on the server" >> $GITHUB_STEP_SUMMARY
        echo "5. Note the server IP address shown in the UI" >> $GITHUB_STEP_SUMMARY
        echo "6. Run \`start-client.sh\` (or \`.bat\` on Windows) on the client" >> $GITHUB_STEP_SUMMARY
        echo "7. Enter server IP and click Connect!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **No Java installation required - JRE is bundled!**" >> $GITHUB_STEP_SUMMARY
