name: Build and Package

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Setup Java (JDK 11)
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      
      # Step 3: Build with Maven
      - name: Build with Maven
        run: mvn clean package -DskipTests -q
      
      # Step 4: Run packaging script
      - name: Package Client and Server
        run: |
          powershell -NoProfile -File .\scripts\package.ps1
      
      # Step 5: Upload artifacts
      - name: Upload Client ZIP
        uses: actions/upload-artifact@v3
        with:
          name: remote-client-package
          path: remote-client.zip
      
      - name: Upload Server ZIP
        uses: actions/upload-artifact@v3
        with:
          name: remote-server-package
          path: remote-server.zip
      
      # Step 9: Create Release (optional - only on tags)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
      
      # Step 10: Upload release assets (if release created)
      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./remote-client.zip
          asset_name: remote-client-${{ github.ref_name }}.zip
          asset_content_type: application/zip
      
      # Step 11: Display build summary
      - name: Build Summary
        run: |
          echo "=== BUILD SUMMARY ==="
          echo "✓ Maven build completed"
          echo "✓ remote-client.jar created"
          echo "✓ remote-server.jar created"
          echo "✓ remote-client.zip packaged"
          echo "✓ remote-server.zip packaged"
          echo "Artifacts ready for download!"
